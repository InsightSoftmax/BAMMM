# Slurm job example
# Shows a Slurm-native job authored in SPLAT format.
# Converting this to another scheduler will preserve all Tier 1 and Tier 2 fields;
# Slurm-specific extensions (time_min, wckey, burst_buffer, etc.) will be dropped
# with a warning when targeting non-Slurm schedulers.

apiVersion: bammm.io/v1alpha1
kind: Job
metadata:
  name: slurm-example
  labels:
    app: bammm-example
spec:
  schedule:
    queue: standard
    account: my-project
    priority: 500
    walltime: PT30M
    walltimeMin: PT5M              # backfill: accept as short as 5 minutes
    reservation: ""
  resources:
    nodes: 1
    tasks: 1
    cpusPerTask: 4
    memoryPerTask: "8Gi"
    gpu:
      count: 1
      type: a100
  execution:
    script: |
      #!/bin/bash
      echo "Running on partition: ${SLURM_JOB_PARTITION}"
      echo "Job ID: ${SLURM_JOB_ID}"
      echo "Node: ${SLURM_NODELIST}"
      nvidia-smi
      sleep 120
    workingDir: /scratch/$USER
    environment:
      vars:
        MY_VAR: hello
  placement:
    constraint: "avx512"
    exclusive: false
  output:
    stdout: "/scratch/logs/slurm-{job_id}.out"
    stderr: "/scratch/logs/slurm-{job_id}.err"
  notifications:
    email: "user@example.com"
    events: [end, fail]
  lifecycle:
    maxRetries: 1
    requeueOnFailure: false

  extensions:
    slurm:
      mpi: pmix_v4
      time_min: PT5M
      wckey: my-workflow-key
      kill_on_bad_exit: true
      gpu_bind: closest
      cpus_per_gpu: 4
      mem_per_gpu: "16Gi"
      signalBeforeEnd: "USR1@60"
