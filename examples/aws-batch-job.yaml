# AWS Batch example
# AWS Batch is not one of the primary SPLAT target schedulers (it has its own
# submission API), but BAMMM can generate an AWS Batch job definition JSON
# from this SPLAT spec. The aws_batch extension block carries AWS-specific
# fields with no generic equivalent.
#
# Note: AWS Batch jobs run in containers on EC2; the container image is required.

apiVersion: bammm.io/v1alpha1
kind: Job
metadata:
  name: aws-batch-example
  labels:
    app: bammm-example
spec:
  schedule:
    queue: aws-batch-queue
    priority: 500
    walltime: PT1H
  resources:
    tasks: 1
    cpusPerTask: 2
    memoryPerTask: "4Gi"
  lifecycle:
    maxRetries: 3
  execution:
    container:
      image: "amazon/amazon-ecs-sample:latest"
      command: ["sh", "-c"]
      args:
        - |
          echo "Running on AWS Batch"
          echo "Job ID: ${AWS_BATCH_JOB_ID}"
          echo "Job Queue: ${AWS_BATCH_JQ_NAME}"
          sleep 300
      environment:
        vars:
          INPUT_FILE: "s3://my-bucket/input/data.txt"
          OUTPUT_FILE: "s3://my-bucket/output/result.txt"
  output:
    stdout: "/tmp/job.out"
    stderr: "/tmp/job.err"

  extensions:
    # AWS Batch does not fit cleanly into any single extension namespace since it
    # is a cloud-managed service, not a cluster scheduler. These fields are used
    # when BAMMM targets AWS Batch output format.
    slurm: {}     # placeholder — BAMMM will warn: "AWS Batch target ignores slurm extensions"
