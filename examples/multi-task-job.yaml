apiVersion: bammm.io/v1alpha1
kind: Job
metadata:
  name: multi-task-example
  labels:
    app: bammm-example
spec:
  schedule:
    queue: default
    priority: 600
    walltime: PT30M
  gang:
    minAvailable: 4
    style: hard
    timeout: PT5M
  tasks:
    - name: data-prep
      replicas: 1
      resources:
        cpusPerTask: 1
        memoryPerTask: "1Gi"
        limits:
          cpusPerTask: 2
          memoryPerTask: "2Gi"
      execution:
        container:
          image: alpine:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Preparing data..."
              sleep 30
              echo "Data preparation completed"
        script: |
          #!/bin/bash
          echo "Preparing data..."
          sleep 30
          echo "Data preparation completed"

    - name: compute-worker
      replicas: 3
      resources:
        cpusPerTask: 2
        memoryPerTask: "2Gi"
        limits:
          cpusPerTask: 4
          memoryPerTask: "4Gi"
      execution:
        container:
          image: busybox:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Starting compute worker ${BAMMM_TASK_INDEX}"
              sleep 60
              echo "Compute worker ${BAMMM_TASK_INDEX} completed"
          environment:
            vars:
              BAMMM_TASK_INDEX: ""     # injected per replica
        script: |
          #!/bin/bash
          echo "Starting compute worker ${BAMMM_TASK_INDEX}"
          sleep 60
          echo "Compute worker ${BAMMM_TASK_INDEX} completed"
      dependsOn:
        - name: data-prep
