apiVersion: bammm.io/v1alpha1
kind: Job
metadata:
  name: hello-world
  labels:
    app: bammm-example
spec:
  schedule:
    queue: default
    priority: 500
    walltime: PT5M
  resources:
    tasks: 1
    cpus_per_task: 1
    memory_per_task: "128Mi"
  execution:
    container:
      image: busybox:latest
      command: ["echo", "Hello from BAMMM!"]
    script: |
      #!/bin/bash
      echo "Hello from BAMMM!"
