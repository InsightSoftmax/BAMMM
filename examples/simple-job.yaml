apiVersion: batch.unified.io/v1alpha1
kind: BatchJob
metadata:
  name: simple-example
  labels:
    app: bammm-example
spec:
  queue: default
  priorityClassName: normal
  tasks:
    - name: hello-world
      replicas: 1
      pod:
        containers:
          - name: main
            image: busybox:latest
            command: ["echo", "Hello from BAMMM!"]
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"
        restartPolicy: Never 