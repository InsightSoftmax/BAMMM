apiVersion: bammm.io/v1alpha1
kind: Job
metadata:
  name: array-example
  labels:
    app: bammm-example
spec:
  schedule:
    queue: default
    priority: 500
    walltime: PT30M
  resources:
    tasks: 1
    cpusPerTask: 1
    memoryPerTask: "512Mi"
    limits:
      cpusPerTask: 1
      memoryPerTask: "1Gi"
  array:
    indices: "0-4"           # 5 elements (0,1,2,3,4)
    maxConcurrent: 2        # at most 2 running simultaneously
  execution:
    container:
      image: busybox:latest
      command: ["sh", "-c"]
      args:
        - |
          echo "Processing array job ${BAMMM_ARRAY_INDEX}"
          sleep 10
          echo "Array job ${BAMMM_ARRAY_INDEX} completed"
      environment:
        vars:
          BAMMM_ARRAY_INDEX: ""    # set per element; maps to scheduler native var
    script: |
      #!/bin/bash
      echo "Processing array job ${BAMMM_ARRAY_INDEX}"
      sleep 10
      echo "Array job ${BAMMM_ARRAY_INDEX} completed"
  output:
    stdout: "/scratch/array-{job_id}-{array_index}.out"
    stderr: "/scratch/array-{job_id}-{array_index}.err"
