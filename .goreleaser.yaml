version: 2

project_name: bammm

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: bammm
    main: ./cmd/bammm
    binary: bammm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # windows/arm64 is less tested — omit for now
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: bammm
    builds: [bammm]
    # Version-less names so `releases/latest/download/<name>` URLs are stable.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - SPEC.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: finos
    name: bammm
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
