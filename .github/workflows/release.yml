name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  id-token: write   # cosign keyless signing
  packages: write   # push image to GHCR

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Install cosign for keyless signing (no private key needed).
      - uses: sigstore/cosign-installer@v3

      # Install syft for SBOM generation.
      - uses: anchore/sbom-action/download-syft@v0

      # Multi-arch Docker builds need QEMU + buildx.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR so GoReleaser can push the image.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser  # free tier
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to InsightSoftmax/homebrew-tap. Falls back to
          # GITHUB_TOKEN so a release without the secret still succeeds for every
          # other artifact (the Homebrew push is the only step that needs it).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}

      # Sign checksums file — this is the common pattern for Go CLIs.
      # Consumers verify with: cosign verify-blob --certificate-identity-regexp ...
      - name: Sign release checksums
        run: |
          cosign sign-blob \
            --yes \
            --output-certificate bammm_checksums.pem \
            --output-signature bammm_checksums.sig \
            dist/bammm_*_checksums.txt
        env:
          COSIGN_EXPERIMENTAL: "1"

      # Generate SBOM for the module.
      - name: Generate SBOM
        run: syft . -o spdx-json=bammm-sbom.spdx.json

      # Upload the signature and SBOM to the GitHub release.
      - name: Attach signature and SBOM to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            bammm_checksums.pem \
            bammm_checksums.sig \
            bammm-sbom.spdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
