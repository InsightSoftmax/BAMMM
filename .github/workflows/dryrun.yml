name: Dry-run (Tier 3)

# Tier 3 execution validation: submit emitted specs to real scheduler admission
# paths without running the workload. Slower and flakier than the main CI gate
# (spins up kind + operators, sets up Slurm), so it lives in its own workflow —
# triggered on PRs that touch the emitters, plus nightly and on demand.
on:
  pull_request:
    paths:
      - 'internal/emitter/**'
      - 'internal/splat/**'
      - 'internal/*/types.go'
      - 'scripts/dryrun/**'
      - '.github/workflows/dryrun.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: read

env:
  CERT_MANAGER_VERSION: v1.16.2
  VOLCANO_VERSION: v1.10.0
  KUEUE_VERSION: v0.10.1
  JOBSET_VERSION: v0.7.2

jobs:
  k8s-dryrun:
    name: K8s dry-run (kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: astral-sh/setup-uv@v6
      - uses: helm/kind-action@v1.12.0

      - name: Install cert-manager
        run: |
          set -euo pipefail
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl wait --for=condition=Available --timeout=300s deployment --all -n cert-manager

      - name: Install operators
        run: |
          set -euo pipefail
          kubectl apply -f "https://raw.githubusercontent.com/volcano-sh/volcano/${VOLCANO_VERSION}/installer/volcano-development.yaml"
          kubectl apply --server-side -f "https://github.com/kubernetes-sigs/kueue/releases/download/${KUEUE_VERSION}/manifests.yaml"
          kubectl apply --server-side -f "https://github.com/kubernetes-sigs/jobset/releases/download/${JOBSET_VERSION}/manifests.yaml"

      - name: Wait for operator webhooks
        run: |
          set -euo pipefail
          kubectl wait --for=condition=Available --timeout=300s deployment --all -n volcano-system
          kubectl wait --for=condition=Available --timeout=300s deployment --all -n kueue-system
          kubectl wait --for=condition=Available --timeout=300s deployment --all -n jobset-system

      - name: Apply cluster prerequisites
        run: kubectl apply -f scripts/dryrun/prereqs.yaml

      - name: Dry-run emitted manifests
        run: bash scripts/dryrun/k8s.sh

  slurm-dryrun:
    name: Slurm dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: koesterlab/setup-slurm-action@v1
      - name: sbatch --test-only
        run: bash scripts/dryrun/slurm.sh
