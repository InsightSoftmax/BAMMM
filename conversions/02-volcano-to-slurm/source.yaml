# A realistic Volcano vcjob for a parameter-server style TensorFlow training job.
# This style of job (master + worker + ps roles) is native to Volcano but does not
# map directly to any HPC scheduler concept.

apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: tf-resnet-training
  namespace: ml-team
spec:
  schedulerName: volcano
  queue: ml-gpu
  priorityClassName: high-priority
  minAvailable: 7       # 1 chief + 4 workers + 2 ps must all start
  maxRetry: 3
  ttlSecondsAfterFinished: 7200

  plugins:
    env: []
    svc: []
    tensorflow:
      - "--port=2222"
      - "--worker=worker"
      - "--ps=ps"
      - "--chief=chief"

  policies:
    - event: PodEvicted
      action: RestartJob
    - event: TaskCompleted
      action: CompleteJob

  tasks:
    - name: chief
      replicas: 1
      template:
        spec:
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: tensorflow
              image: tensorflow/tensorflow:2.14.0-gpu
              command: ["/bin/bash", "-c"]
              args:
                - |
                  python /app/train_resnet.py \
                    --task_type=chief \
                    --num_epochs=50 \
                    --batch_size=256 \
                    --learning_rate=0.1 \
                    --data_dir=/data/imagenet \
                    --model_dir=/models/resnet50
              env:
                - name: TF_CPP_MIN_LOG_LEVEL
                  value: "2"
                - name: PYTHONPATH
                  value: /app
              resources:
                requests:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "4"
                limits:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "4"
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: models
                  mountPath: /models
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: imagenet-pvc
            - name: models
              persistentVolumeClaim:
                claimName: model-store-pvc
          restartPolicy: Never

    - name: worker
      replicas: 4
      template:
        spec:
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: tensorflow
              image: tensorflow/tensorflow:2.14.0-gpu
              command: ["/bin/bash", "-c"]
              args:
                - |
                  python /app/train_resnet.py \
                    --task_type=worker \
                    --num_epochs=50 \
                    --batch_size=256 \
                    --learning_rate=0.1 \
                    --data_dir=/data/imagenet \
                    --model_dir=/models/resnet50
              env:
                - name: TF_CPP_MIN_LOG_LEVEL
                  value: "2"
                - name: PYTHONPATH
                  value: /app
              resources:
                requests:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "4"
                limits:
                  cpu: "8"
                  memory: 32Gi
                  nvidia.com/gpu: "4"
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: models
                  mountPath: /models
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: imagenet-pvc
            - name: models
              persistentVolumeClaim:
                claimName: model-store-pvc
          restartPolicy: Never

    - name: ps
      replicas: 2
      template:
        spec:
          containers:
            - name: tensorflow
              image: tensorflow/tensorflow:2.14.0-gpu
              command: ["/bin/bash", "-c"]
              args:
                - |
                  python /app/train_resnet.py \
                    --task_type=ps \
                    --num_epochs=50 \
                    --batch_size=256 \
                    --learning_rate=0.1 \
                    --data_dir=/data/imagenet \
                    --model_dir=/models/resnet50
              resources:
                requests:
                  cpu: "4"
                  memory: 16Gi
                limits:
                  cpu: "4"
                  memory: 16Gi
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: models
                  mountPath: /models
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: imagenet-pvc
            - name: models
              persistentVolumeClaim:
                claimName: model-store-pvc
          restartPolicy: Never
